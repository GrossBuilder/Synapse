services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_strong_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== Next.js App ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://synapse:${DB_PASSWORD:-changeme_strong_password}@postgres:5432/synapse?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== Socket.IO ====================
  socket:
    build:
      context: .
      dockerfile: Dockerfile.socket
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://synapse:${DB_PASSWORD:-changeme_strong_password}@postgres:5432/synapse?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379
      SOCKET_PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== TURN Server (coturn) ====================
  coturn:
    image: coturn/coturn:alpine
    restart: always
    network_mode: host
    volumes:
      - ./deploy/turnserver.conf:/etc/turnserver.conf:ro
    command: ["-c", "/etc/turnserver.conf"]

volumes:
  pgdata:
  redisdata:
