<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#030712"/>
  <rect x="2" y="2" width="60" height="60" rx="14" stroke="url(#g)" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- S-curve -->
  <path d="M 22 18 C 22 32, 32 26, 32 32 C 32 38, 42 32, 42 46"
        stroke="url(#g)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Top node -->
