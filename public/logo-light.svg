<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon: Фаворит-1 style on light background -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="#f8fafc"/>
  <rect x="4" y="4" width="92" height="92" rx="22" stroke="url(#g)" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- S-curve -->
  <path d="M 34 28 C 34 50, 50 40, 50 50 C 50 60, 66 50, 66 72"
        stroke="url(#g)" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Top node -->
  <circle cx="34" cy="28" r="8" fill="url(#g)"/>
  <!-- Bottom node -->
  <circle cx="66" cy="72" r="8" fill="url(#g)"/>
  <!-- Center spark -->
  <circle cx="50" cy="50" r="3.5" fill="#7c3aed" opacity="0.6"/>

  <!-- Wordmark (dark for light bg) -->
  <text x="120" y="66" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="46" font-weight="700" letter-spacing="-1" fill="#1e1b4b">
    Synapse
  </text>
</svg>
