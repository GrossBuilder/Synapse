# Synapse TURN Server Configuration (coturn)
# Replace YOUR_SERVER_IP and credentials before deploying

listening-port=3478
tls-listening-port=5349

# Your server's public IP
external-ip=YOUR_SERVER_IP

# Realm (your domain)
realm=synapse.app

# Authentication
lt-cred-mech
user=synapse:CHANGE_THIS_TURN_PASSWORD

# Logging
log-file=/var/log/turnserver.log
simple-log

# Security
no-multicast-peers
no-cli
fingerprint

# TURN relay ports range
min-port=49152
max-port=65535

# TLS (uncomment and provide certs for production)
# cert=/etc/ssl/certs/turn.pem
# pkey=/etc/ssl/private/turn.key
